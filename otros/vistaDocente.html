<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/png" href="/./images/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/./images/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/./images/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/./images/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/./images/favicon/site.webmanifest" />
  <meta charset="UTF-8">
  <title>Mis Cursos - Docente</title>
  <link rel="stylesheet" href="../../Styles/Styles.css">
  <link rel="stylesheet" href="../../Styles/StylesVistaDocente.css">
</head>
<body>

  <header class="barraNav">
    <div class="logoBarra">
      <img src="../../images/logo_blanco.png" alt="Logo" class="logo">
    </div>
    <nav class="menuStudent">
      <a href="./vistaDocente.html" class="nav-link active">Mis Cursos</a>
      <a href="./perfil.html" class="nav-link">Mi Perfil</a>
    </nav>

    <div class="navControls">
      <button class="btnTheme" id="btnTheme" title="Cambiar tema">🌙</button>

      <select class="selectIdioma" id="selectIdioma">
        <option value="es">Español ▾</option>
        <option value="en">English ▾</option>
      </select>

      <div class="userMenu">
        <button class="userBtn" id="userBtn">
          <div class="userAvatar">
            <img src="../../images/ImagenPerfil.png" alt="Usuario">
          </div>
          <span class="userName" id="nombreSesion"></span>
          <span class="arrow">▲</span>
        </button>

        <div class="dropdown" id="dropdown">
          <a href="./perfil.html" class="dropItem">
            <img src="../../images/user.svg" class="dropIcon-img" alt="Mi perfil">
            Mi perfil
          </a>
          <div class="dropDivider"></div>
          <a href="#" id="btnLogout" class="dropItem logout">
            <img src="../../images/logout.svg" class="dropIcon-img" alt="Cerrar sesion">
            Cerrar sesión
          </a>
        </div>
      </div>
    </div>
  </header>

  <div class="pagina">

    <!-- Saludo personalizado -->
    <div class="saludo-docente">
      <h2 id="tituloSaludo">Bienvenido</h2>
      <p id="subtituloSaludo" class="subtitulo">Aquí puedes ver los cursos que tienes asignados.</p>
    </div>

    <!-- Buscador -->
    <div class="buscador-contenedor">
      <input type="text" id="buscador" placeholder="Buscar curso..." oninput="buscar()">
    </div>

    <!-- Mensaje si no hay cursos -->
    <p id="mensajeSinCursos" class="mensaje-vacio" style="display:none;">
      No tienes cursos asignados actualmente.
    </p>

    <!-- Tarjetas de cursos -->
    <div id="contenedorCursos" class="contenedor-cards">
      <!-- Se llena dinámicamente con JS -->
    </div>

    <!-- Modal de detalle de curso -->
    <div id="modalOverlay" class="modal-overlay" onclick="cerrarModal(event)">
      <div class="modal-contenido">
        <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
        <h3 id="modalTitulo"></h3>
        <p id="modalDescripcion"></p>

        <h4>Módulos del curso</h4>
        <ul id="modalModulos" class="lista-modulos"></ul>

        <h4>Estudiantes matriculados</h4>
        <ul id="modalEstudiantes" class="lista-estudiantes"></ul>
      </div>
    </div>

  </div>

  <script src="../../Scripts/barraNav.js"></script>
  <script src="../../Scripts/ScriptVistaDocente.js"></script>

</body>
</html>
