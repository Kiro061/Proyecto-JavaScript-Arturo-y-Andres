<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/png" href="/./images/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/./images/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/./images/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/./images/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/./images/favicon/site.webmanifest" />
  <meta charset="UTF-8">
  <title>Estudiantes</title>
  <link rel="stylesheet" href="../../Styles/Styles.css">
  <link rel="stylesheet" href="../../Styles/StylesEstudiantes.css">
</head>
<body>

  <header class="barraNav">
    <div class="logoBarra">
      <img src="../../images/logo_blanco.png" alt="Logo" class="logo">
    </div>
    <nav class="menuStudent">
      <a href="./principal.html" class="nav-link">Panel</a>
      <a href="./Cursos.html" class="nav-link">Cursos</a>
      <a href="./Docentes.html" class="nav-link">Docentes</a>
      <a href="./administrativos.html" class="nav-link">Administrativos</a>
      <a href="./estudiantes.html" class="nav-link active">Estudiantes</a>
    </nav>

    <div class="navControls">
      <button class="btnTheme" id="btnTheme" title="Cambiar tema">🌙</button>

      <select class="selectIdioma" id="selectIdioma">
        <option value="es">Español ▾</option>
        <option value="en">English ▾</option>
      </select>

      <div class="userMenu">
        <button class="userBtn" id="userBtn">
          <div class="userAvatar">
            <img src="../../images/ImagenPerfil.png" alt="Usuario">
          </div>
          <span class="userName" id="nombreSesion"></span>
          <span class="arrow">▲</span>
        </button>

        <div class="dropdown" id="dropdown">
          <a href="./perfil.html" class="dropItem">
            <img src="../../images/user.svg" class="dropIcon-img" alt="Mi perfil">
            Mi perfil
          </a>
          <a href="#" class="dropItem">
            <img src="../../images/settings.svg" class="dropIcon-img" alt="Ajustes">
            Ajustes
          </a>
          <div class="dropDivider"></div>
          <a href="#" id="btnLogout" class="dropItem logout">
            <img src="../../images/logout.svg" class="dropIcon-img" alt="Cerrar sesion">
            Cerrar sesión
          </a>
        </div>
      </div>
    </div>
  </header>

  <div class="pagina">

    <h2>Gestión de Estudiantes</h2>

    <!-- Contador de registros -->
    <p id="contador" class="contador-texto">Total de estudiantes: 0</p>

    <!-- Formulario de registro -->
    <div class="formulario">

      <input type="hidden" id="indiceEditar" value="-1">

      <label>Código:</label>
      <input type="text" id="codigo" placeholder="EST-001">

      <label>Identificación:</label>
      <input type="text" id="identificacion" placeholder="1098765432">

      <label>Nombres:</label>
      <input type="text" id="nombres" placeholder="Laura">

      <label>Apellidos:</label>
      <input type="text" id="apellidos" placeholder="Pérez">

      <label>Email:</label>
      <input type="text" id="email" placeholder="laura@abc.edu.co">

      <label>URL foto:</label>
      <input type="text" id="foto" placeholder="https://...">

      <label>Grado:</label>
      <select id="grado">
        <option value="">Seleccionar...</option>
        <option>Sexto</option>
        <option>Séptimo</option>
        <option>Octavo</option>
        <option>Noveno</option>
        <option>Décimo</option>
        <option>Undécimo</option>
      </select>

      <label>Cursos matriculados:</label>
      <div id="checkboxCursos" class="checkbox-lista">
        <!-- Se llena dinámicamente con JS -->
      </div>

      <p id="error" style="color:red;"></p>

      <button onclick="guardar()">Guardar</button>
      <button onclick="limpiar()">Cancelar</button>

    </div>

    <!-- Buscador -->
    <div class="buscador-contenedor">
      <input type="text" id="buscador" placeholder="Buscar estudiante..." oninput="buscar()">
    </div>

    <h3>Lista de estudiantes</h3>

    <table id="tabla">
      <thead>
        <tr>
          <th>Foto</th>
          <th>Código</th>
          <th>Identificación</th>
          <th>Nombres</th>
          <th>Apellidos</th>
          <th>Email</th>
          <th>Grado</th>
          <th>Cursos</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="filas">
      </tbody>
    </table>

  </div>

  <script src="../../Scripts/barraNav.js"></script>
  <script src="../../Scripts/Scriptsestudiantes.js"></script>

</body>
</html>
