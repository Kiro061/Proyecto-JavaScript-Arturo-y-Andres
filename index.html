<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/png" href="/./images/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/./images/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/./images/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/./images/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/./images/favicon/site.webmanifest" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LMS - Institución Educativa ABC</title>
  <link rel="stylesheet" href="./Styles/stylesLogin.css"/>
</head>
<body>

<div class="contenedor">
    <img src="./images/logo_negro.png" alt="Logo" width="40%">
    <h1>Institución Educativa ABC</h1>
    <p class="subtitulo">Selecciona tu rol e inicia sesión</p>

    <!-- Botones para elegir rol -->
    <div class="roles">
    <button class="btn-rol activo" onclick="cambiarRol('estudiante', this)">🎓 Estudiante</button>
    <button class="btn-rol" onclick="cambiarRol('docente', this)">📚 Docente</button>
    <button class="btn-rol" onclick="cambiarRol('coordinador', this)">⚙️ Coordinador</button>
    </div>

    <!-- Formulario de login -->
    <div class="formulario">


        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="tucorreo@abc.edu.co" />

        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" placeholder="••••••••" />

        <p id="mensaje-error" class="error"></p>

        <button class="btn-ingresar" onclick="iniciarSesion()">Ingresar</button>

    </div>

</div>

<script src="./Scripts/loginIndex.js"></script>
</body>
</html>
