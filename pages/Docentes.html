<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Docentes</title>
  <link rel="stylesheet" href="../Styles/Styles.css">
  <link rel="stylesheet" href="../Styles/Stylesdocentes.css">
</head>
<body>

  <header class="barraNav">
    <div class="logoBarra">
      <img src="../images/logo_blanco.png" alt="Logo" class="logo">
    </div>
    <nav class="menuStudent">
      <a href="./principal.html" class="nav-link">Panel</a>
      <a href="#" class="nav-link">Cursos</a>
      <a href="./Docentes.html" class="nav-link active">Docentes</a>
      <a href="#" class="nav-link">Administrativos</a>
    </nav>

    <div class="navControls">
      <button class="btnTheme" id="btnTheme" title="Cambiar tema">🌙</button>

      <select class="selectIdioma" id="selectIdioma">
        <option value="es">Español ▾</option>
        <option value="en">English ▾</option>
      </select>

      <div class="userMenu">
        <button class="userBtn" id="userBtn">
          <div class="userAvatar">
            <img src="../images/ImagenPerfil.png" alt="Usuario">
          </div>
          <span class="userName">Andres Castellanos</span>
          <span class="arrow">▲</span>
        </button>

        <div class="dropdown" id="dropdown">
          <a href="#" class="dropItem">
            <img src="../images/user.svg" class="dropIcon-img" alt="Mi perfil">
            Mi perfil
          </a>
          <a href="#" class="dropItem">
            <img src="../images/settings.svg" class="dropIcon-img" alt="Ajustes">
            Ajustes
          </a>
          <div class="dropDivider"></div>
          <a href="#" class="dropItem logout">
            <img src="../images/logout.svg" class="dropIcon-img" alt="Cerrar sesion">
            Cerrar sesión
          </a>
        </div>
      </div>
    </div>

  </header>

  <div class="pagina">

    <h2>Gestion de Docentes</h2>

    <div class="formulario">

      <input type="hidden" id="indiceEditar" value="-1">

      <label>Codigo:</label>
      <input type="text" id="codigo" placeholder="DOC-001">

      <label>Identificacion:</label>
      <input type="text" id="identificacion" placeholder="1098765432">

      <label>Nombres:</label>
      <input type="text" id="nombres" placeholder="Carlos">

      <label>Apellidos:</label>
      <input type="text" id="apellidos" placeholder="Martinez">

      <label>Email:</label>
      <input type="text" id="email" placeholder="correo@abc.edu.co">

      <label>URL foto:</label>
      <input type="text" id="foto" placeholder="https://...">

      <label>Area academica:</label>
      <select id="area">
        <option value="">Seleccionar...</option>
        <option>Biologia</option>
        <option>Informatica</option>
        <option>Matematicas</option>
        <option>Lengua Castellana</option>
        <option>Historia</option>
        <option>Fisica</option>
        <option>Quimica</option>
        <option>Artes</option>
        <option>Educacion Fisica</option>
      </select>

      <p id="error" style="color:red;"></p>

      <button onclick="guardar()">Guardar</button>
      <button onclick="limpiar()">Cancelar</button>

    </div>

    <h3>Lista de docentes</h3>

    <table id="tabla">
      <thead>
        <tr>
          <th>Foto</th>
          <th>Codigo</th>
          <th>Identificacion</th>
          <th>Nombres</th>
          <th>Apellidos</th>
          <th>Email</th>
          <th>Area</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="filas">
      </tbody>
    </table>

  </div>

  <script src="../Scripts/barraNav.js"></script>
  <script src="../Scripts/Scriptdocentes.js"></script>

</body>
</html>
